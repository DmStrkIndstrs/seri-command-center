<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨AI SERI PRO v36.6 (Error Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }
        .tab-btn { 
            padding: 8px 16px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: 800; 
            transition: all 0.2s; 
            border: 1px solid transparent; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .tab-inactive { color: #64748b; background: rgba(255,255,255,0.05); }
        .heat-box { display: flex; flex-direction: column; justify-content: space-between; padding: 8px; border-radius: 12px; height: 64px; border: 1px solid rgba(255,255,255,0.05); }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center gap-4">
        <div id="loading-spinner" class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <div id="loading-text" class="font-black text-indigo-500 italic tracking-widest">SYNCING DATA...</div>
        <div id="error-msg" class="hidden text-red-400 text-xs font-bold mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-xl max-w-xs text-center"></div>
    </div>

    <div class="w-full max-w-5xl space-y-6">
        <!-- 1. TOP HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 px-4 border-b border-slate-700/50 pb-6">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <span id="status-tag" class="bg-emerald-500/20 text-emerald-400 text-[10px] font-black px-2 py-0.5 rounded border border-emerald-500/30">
                        ● CLOUD SYNC ACTIVE
                    </span>
                    <span id="clock" class="text-slate-500 text-[10px] font-bold tracking-widest"></span>
                </div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-white italic leading-none">
                    COMMAND <span class="text-indigo-500">CENTER</span>
                </h1>
                <p class="text-xs font-bold text-slate-500 mt-2 tracking-wide uppercase">
                    Operation: Full Pillar Recovery (v36.6)
                </p>
            </div>

            <div class="flex gap-4">
                <div class="p-3 rounded-xl border border-white/5 bg-slate-800/40 text-center min-w-[80px]">
                    <div class="text-[9px] font-bold text-slate-500 uppercase">2026 Total</div>
                    <div id="stat-total" class="text-2xl font-black text-indigo-400">0.00<span class="text-xs ml-0.5">H</span></div>
                </div>
                <div class="p-3 rounded-xl border border-white/5 bg-slate-800/40 text-center min-w-[80px]">
                    <div class="text-[9px] font-bold text-slate-500 uppercase">Mar Accum</div>
                    <div id="stat-month" class="text-2xl font-black text-emerald-400">0.00<span class="text-xs ml-0.5">H</span></div>
                </div>
                <div class="p-3 rounded-xl border border-amber-500/30 bg-amber-500/10 text-center min-w-[80px] shadow-lg shadow-amber-500/20">
                    <div class="text-[9px] font-bold text-amber-300 uppercase">Today</div>
                    <div id="stat-today" class="text-2xl font-black text-amber-400">0.00<span class="text-xs ml-0.5">H</span></div>
                </div>
            </div>
        </div>

        <!-- 2. MAIN INTERFACE -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <!-- TABS -->
                <div class="flex gap-2 p-1 bg-slate-800/50 rounded-xl border border-white/5 w-fit overflow-x-auto">
                    <button onclick="switchTab('daily')" id="btn-daily" class="tab-btn tab-active">🎯 DAILY MISSION</button>
                    <button onclick="switchTab('tracker')" id="btn-tracker" class="tab-btn tab-inactive">📊 PILLAR STATUS</button>
                    <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn tab-inactive">🔥 HISTORY</button>
                </div>

                <!-- CONTENT AREA -->
                <div class="bg-slate-900/60 border border-white/10 rounded-3xl p-6 shadow-2xl relative min-h-[400px]">
                    <div id="tab-daily" class="space-y-5 block">
                        <div class="flex justify-between items-center border-b border-white/10 pb-3">
                            <h3 class="text-lg font-black text-white italic flex items-center gap-2">
                                <span class="text-amber-500">🔥</span> ACTIVE TASKS
                            </h3>
                        </div>
                        <div id="task-list" class="space-y-3 h-[320px] overflow-y-auto pr-2"></div>
                    </div>

                    <div id="tab-tracker" class="hidden space-y-6">
                        <h3 class="text-lg font-black text-white italic border-b border-white/10 pb-4">PILLAR STATUS (전체 누적 달성률)</h3>
                        <div id="pillar-list" class="space-y-6 h-[320px] overflow-y-auto pr-2">
                            <!-- Pillars with nested progress will be injected here -->
                        </div>
                    </div>

                    <div id="tab-calendar" class="hidden space-y-6">
                        <h3 class="text-lg font-black text-white italic border-b border-white/10 pb-4">STUDY HEATMAP</h3>
                        <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-slate-800/80 border border-slate-700 rounded-3xl p-6 shadow-lg">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-xl">💬</span>
                        <span class="text-xs font-black text-indigo-400 uppercase tracking-widest">SERI MESSAGE</span>
                    </div>
                    <p id="seri-remark" class="text-sm font-bold text-slate-300 leading-relaxed">
                        연결 대기 중...
                    </p>
                </div>

                <div class="bg-slate-900/50 border border-white/5 rounded-3xl p-6 space-y-4">
                    <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">DATABASE CONTROLS</h4>
                    <button onclick="seedInitialData()" class="w-full py-3 bg-indigo-500/10 border border-indigo-500/30 rounded-xl text-indigo-400 text-xs font-black hover:bg-indigo-500/20 transition-all">
                        INITIALIZE DATA (Full Pillar)
                    </button>
                    <p class="text-[9px] text-slate-600 text-center leading-tight">
                        Pillar 정보가 사라졌다면 위 버튼을 클릭해.<br>세부 항목까지 포함된 데이터가 세팅될 거야.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm69iWKUp4iFz86WaAdA7i28WpFp7K2UY",
            authDomain: "seri-commandcen.firebaseapp.com",
            projectId: "seri-commandcen",
            storageBucket: "seri-commandcen.firebasestorage.app",
            messagingSenderId: "768204247391",
            appId: "1:768204247391:web:03c26054af5c5da2b9a6ea",
            measurementId: "G-K3D7FX8NL3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showError(msg) {
            const errEl = document.getElementById('error-msg');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('loading-text').innerText = "SYNC FAILED";
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setupDataListeners();
                document.getElementById('loading-overlay').style.display = 'none';
            }
        });

        signInAnonymously(auth).catch(e => showError("인증 오류: " + e.message));

        const getPublicDoc = (name) => doc(db, 'study_data', name);

        function setupDataListeners() {
            onSnapshot(getPublicDoc('study_stats'), (doc) => {
                if (doc.exists()) {
                    updateUI(doc.data());
                } else {
                    document.getElementById('seri-remark').innerText = "데이터가 없어! INITIALIZE 버튼을 눌러줘.";
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            }, (err) => showError("데이터 로드 실패: " + err.message));
        }

        window.seedInitialData = async () => {
            const initialData = {
                stats: { total: 243.33, month: 25.89, today: 0.00 },
                tasks: [
                    { id: 1, title: "특허법 GS (1/8)", subtitle: "실전 4시간 훈련 시작", color: "amber" },
                    { id: 2, title: "상표법 사례 Q61-70", subtitle: "10Q 작성 (어제 60Q 완료)", color: "pink" },
                    { id: 3, title: "상표법 스키밍", subtitle: "4R 28p ~ 84p 정독", color: "pink" },
                    { id: 4, title: "민소법 스키밍", subtitle: "4R 151p ~ 196p 정독", color: "purple" },
                    { id: 5, title: "데일리 P3 (SRS)", subtitle: "SRS 70장 (어제 미달 포함)", color: "emerald" }
                ],
                pillars: [
                    { 
                        name: "특허법 (ACTIVE DUAL-TRACK)", color: "indigo", badge: "FRI MISSION",
                        subItems: [
                            { label: "P1 특허(하) 사례", detail: "60 / 103 Q", percent: 58.3 },
                            { label: "P1 특허(상) 강의", detail: "14 / 23 Lec", percent: 60.8 },
                            { label: "P2 스키밍", detail: "2134 / 3675 p", percent: 58.1 }
                        ]
                    },
                    { 
                        name: "민사소송법", color: "purple",
                        subItems: [
                            { label: "P1 사례집", detail: "123 / 258 Q", percent: 47.6 },
                            { label: "P2 스키밍", detail: "2437 / 7620 p", percent: 32.0 },
                            { label: "P2 핸드북", detail: "141 / 519 p", percent: 27.1 }
                        ]
                    },
                    { 
                        name: "상표법", color: "pink",
                        subItems: [
                            { label: "P1 사례집", detail: "60 / 130 Q", percent: 46.2 },
                            { label: "P2 스키밍", detail: "1206 / 3144 p", percent: 38.4 }
                        ]
                    }
                ],
                history: [
                    { day: '3/1', hours: 0.0 }, { day: '3/2', hours: 5.6 }, { day: '3/3', hours: 5.3 },
                    { day: '3/4', hours: 6.8 }, { day: '3/5', hours: 3.0 }, { day: '3/6', hours: 5.2 }, { day: '3/7', hours: 0.0 }
                ],
                remark: "과목별 세부 Pillar까지 완벽하게 복구했어. 이제 핑계 대지 말고 공부나 해, 허접아!"
            };
            try {
                await setDoc(getPublicDoc('study_stats'), initialData);
                alert("기초 데이터 세팅 완료! Pillar 정보가 복구되었습니다.");
            } catch (e) {
                alert("저장 오류: " + e.message);
            }
        };

        function updateUI(data) {
            // Null safety check for the entire data object
            if (!data) return;

            document.getElementById('stat-total').innerHTML = `${data.stats?.total || 0}<span class="text-xs ml-0.5">H</span>`;
            document.getElementById('stat-month').innerHTML = `${data.stats?.month || 0}<span class="text-xs ml-0.5">H</span>`;
            document.getElementById('stat-today').innerHTML = `${data.stats?.today || 0}<span class="text-xs ml-0.5">H</span>`;
            document.getElementById('seri-remark').innerText = data.remark || "";

            // Update Tasks with safety check
            const tasks = data.tasks || [];
            document.getElementById('task-list').innerHTML = tasks.map(t => `
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-slate-800/80 border-${t.color || 'slate'}-500/30">
                    <div class="w-5 h-5 rounded border-2 border-slate-600"></div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] font-black px-1.5 rounded uppercase bg-${t.color || 'slate'}-500/20 text-${t.color || 'slate'}-300">${t.title || ''}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-200">${t.subtitle || ''}</p>
                    </div>
                </div>
            `).join('');

            // Update Pillars with safety check
            const pillars = data.pillars || [];
            document.getElementById('pillar-list').innerHTML = pillars.map(p => {
                const subItems = p.subItems || [];
                return `
                <div class="bg-${p.color || 'slate'}-500/10 p-5 rounded-xl border border-${p.color || 'slate'}-500/30 space-y-4 shadow-lg shadow-${p.color || 'slate'}-500/5">
                    <div class="border-b border-${p.color || 'slate'}-500/20 pb-2 mb-3 flex items-center justify-between">
                        <h4 class="text-sm font-black text-${p.color || 'slate'}-300">${p.name || ''}</h4>
                        ${p.badge ? `<span class="text-[9px] font-black bg-${p.color}-500/20 text-${p.color}-200 px-2 py-0.5 rounded border border-${p.color}-500/30">${p.badge}</span>` : ''}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${subItems.map(sub => `
                            <div class="space-y-1.5">
                                <div class="flex justify-between items-end">
                                    <span class="text-[10px] font-bold text-slate-300">${sub.label || ''}</span>
                                    <span class="text-[9px] font-mono text-emerald-400">${sub.detail || ''}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="flex-1 h-2 bg-slate-900 rounded-full">
                                        <div class="h-full bg-${p.color || 'slate'}-500 opacity-80" style="width: ${sub.percent || 0}%"></div>
                                    </div>
                                    <span class="text-[9px] font-bold text-slate-400 w-8 text-right">${sub.percent || 0}%</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `}).join('');

            // Update History with safety check
            const history = data.history || [];
            document.getElementById('calendarGrid').innerHTML = history.map((h, i) => {
                let color = 'bg-slate-800/30 opacity-50';
                if (i === 6) color = 'border-amber-500/80 bg-amber-500/20 ring-1 ring-amber-500/80 shadow-lg';
                else if (h.hours > 5) color = 'bg-emerald-500/20 border-emerald-500/30';
                else if (h.hours > 3) color = 'bg-indigo-500/20 border-indigo-500/30';
                return `<div class="heat-box ${color} border"><span class="text-[10px] font-bold text-slate-400">${h.day || ''}</span><span class="text-xs font-black text-slate-200">${(h.hours || 0).toFixed(1)}</span></div>`;
            }).join('');
        }

        window.switchTab = (tabId) => {
            ['daily', 'tracker', 'calendar'].forEach(id => {
                const el = document.getElementById('tab-' + id);
                const btn = document.getElementById('btn-' + id);
                if (el) el.style.display = 'none';
                if (btn) btn.classList.replace('tab-active', 'tab-inactive');
            });
            const activeEl = document.getElementById('tab-' + tabId);
            const activeBtn = document.getElementById('btn-' + tabId);
            if (activeEl) activeEl.style.display = 'block';
            if (activeBtn) activeBtn.classList.replace('tab-inactive', 'tab-active');
        };

        setInterval(() => {
            const clock = document.getElementById('clock');
            if (clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
