<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨AI SERI PRO v37.3 (Weekly Cycle Restored)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }
        .tab-btn { 
            padding: 8px 16px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: 800; 
            transition: all 0.2s; 
            border: 1px solid transparent; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .tab-inactive { color: #64748b; background: rgba(255,255,255,0.05); }
        
        .heat-0 { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.05); }
        .heat-low { background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.2); }
        .heat-mid { background: rgba(99, 102, 241, 0.3); border-color: rgba(99, 102, 241, 0.4); }
        .heat-high { background: rgba(16, 185, 129, 0.3); border-color: rgba(16, 185, 129, 0.4); }
        .heat-today { background: rgba(245, 158, 11, 0.2); border: 2px solid #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }

        .heat-box { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 6px; 
            border-radius: 8px; 
            aspect-ratio: 1/1;
            border-width: 1px;
            transition: all 0.2s;
        }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center gap-4">
        <div id="loading-spinner" class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <div id="loading-text" class="font-black text-indigo-500 italic tracking-widest">SYNCING DATA...</div>
    </div>

    <div class="w-full max-w-5xl space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 px-4 border-b border-slate-700/50 pb-6">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <span id="status-tag" class="bg-emerald-500/20 text-emerald-400 text-[10px] font-black px-2 py-0.5 rounded border border-emerald-500/30">
                        ● CLOUD LIVE
                    </span>
                    <span id="clock" class="text-slate-500 text-[10px] font-bold tracking-widest"></span>
                </div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-white italic leading-none">
                    COMMAND <span class="text-indigo-500">CENTER</span>
                </h1>
                <p class="text-xs font-bold text-slate-500 mt-2 tracking-wide uppercase">
                    Integrated Operation: v5.9.1 Master Roadmap
                </p>
            </div>

            <div class="flex gap-4">
                <div class="p-3 rounded-xl border border-white/5 bg-slate-800/40 text-center min-w-[80px]">
                    <div class="text-[9px] font-bold text-slate-500 uppercase">2026 Total</div>
                    <div id="stat-total" class="text-2xl font-black text-indigo-400">0.00<span class="text-xs ml-0.5">H</span></div>
                </div>
                <div class="p-3 rounded-xl border border-white/5 bg-slate-800/40 text-center min-w-[80px]">
                    <div class="text-[9px] font-bold text-slate-500 uppercase">Mar Accum</div>
                    <div id="stat-month" class="text-2xl font-black text-emerald-400">0.00<span class="text-xs ml-0.5">H</span></div>
                </div>
                <div class="p-3 rounded-xl border border-amber-500/30 bg-amber-500/10 text-center min-w-[80px] shadow-lg shadow-amber-500/20">
                    <div class="text-[9px] font-bold text-amber-300 uppercase">Today</div>
                    <div id="stat-today" class="text-2xl font-black text-amber-400">0.00<span class="text-xs ml-0.5">H</span></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="flex gap-2 p-1 bg-slate-800/50 rounded-xl border border-white/5 w-fit overflow-x-auto">
                    <button onclick="switchTab('daily')" id="btn-daily" class="tab-btn tab-active">🎯 DAILY</button>
                    <button onclick="switchTab('tracker')" id="btn-tracker" class="tab-btn tab-inactive">📊 PILLARS</button>
                    <button onclick="switchTab('schedule')" id="btn-schedule" class="tab-btn tab-inactive">🗓️ WEEKLY</button>
                    <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn tab-inactive">🔥 HEATMAP</button>
                </div>

                <div class="bg-slate-900/60 border border-white/10 rounded-3xl p-6 shadow-2xl relative min-h-[400px]">
                    <div id="tab-daily" class="space-y-5 block">
                        <div id="task-list" class="space-y-3 h-[320px] overflow-y-auto pr-2"></div>
                    </div>

                    <div id="tab-tracker" class="hidden space-y-6">
                        <div id="pillar-list" class="space-y-6 h-[320px] overflow-y-auto pr-2"></div>
                    </div>

                    <div id="tab-schedule" class="hidden space-y-4">
                        <h3 class="text-lg font-black text-white italic border-b border-white/10 pb-4">WEEKLY INTERLEAVING CYCLE</h3>
                        <div id="schedule-list" class="grid grid-cols-1 gap-3 h-[320px] overflow-y-auto pr-2">
                            <!-- Weekly schedule data injected here -->
                        </div>
                    </div>

                    <div id="tab-calendar" class="hidden space-y-6">
                        <h3 class="text-lg font-black text-white italic border-b border-white/10 pb-4 flex justify-between items-center">
                            STUDY LOG <span>🔥</span>
                        </h3>
                        <div id="calendarGrid" class="grid grid-cols-7 sm:grid-cols-8 md:grid-cols-7 gap-2 h-[320px] overflow-y-auto pr-2 pb-4"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-slate-800/80 border border-slate-700 rounded-3xl p-6 shadow-lg">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-xl">💬</span>
                        <span class="text-xs font-black text-indigo-400 uppercase tracking-widest">SERI REMARK</span>
                    </div>
                    <p id="seri-remark" class="text-sm font-bold text-slate-300 leading-relaxed"></p>
                </div>

                <div class="bg-slate-900/50 border border-white/5 rounded-3xl p-6">
                    <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">SYSTEM STATUS</h4>
                    <div class="space-y-2">
                        <div class="p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-lg">
                            <p class="text-[10px] text-indigo-300 font-black">SYNCING WITH FIRESTORE</p>
                        </div>
                        <p class="text-[9px] text-slate-600 italic">"로드맵 v5.9.1이 탭 메뉴에 싹 다 녹아있어. 도망 못 간다!"</p>
                        <button onclick="seedInitialData()" class="w-full mt-2 py-2 bg-slate-800 border border-white/5 rounded-lg text-slate-500 text-[9px] font-black hover:bg-slate-700 transition-all uppercase">Reset Data</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDm69iWKUp4iFz86WaAdA7i28WpFp7K2UY",
            authDomain: "seri-commandcen.firebaseapp.com",
            projectId: "seri-commandcen",
            storageBucket: "seri-commandcen.firebasestorage.app",
            messagingSenderId: "768204247391",
            appId: "1:768204247391:web:03c26054af5c5da2b9a6ea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, 'study_data', 'study_stats'), (docSnap) => {
                    if (docSnap.exists()) updateUI(docSnap.data());
                    document.getElementById('loading-overlay').style.display = 'none';
                });
            }
        });

        signInAnonymously(auth);

        window.seedInitialData = async () => {
            // This function is kept for quick restoration if data is lost
            const initialData = {
                stats: { total: 245.53, month: 28.09, today: 0.8 },
                tasks: [
                    { id: 1, title: "P4 GS 실전 (1회차)", subtitle: "08:30-12:30 실전 훈련", color: "amber" },
                    { id: 2, title: "P1 사례집 풀이", subtitle: "집중 문풀 루틴", color: "indigo" },
                    { id: 3, title: "P2 기본서 스키밍", subtitle: "야간 키워드 인출", color: "purple" }
                ],
                pillars: [
                    { name: "특허법 (ACTIVE)", color: "indigo", subItems: [{ label: "P1 사례", detail: "60/103 Q", percent: 58 }] },
                    { name: "민사소송법", color: "purple", subItems: [{ label: "P1 사례", detail: "123/258 Q", percent: 47 }] }
                ],
                schedule: [
                    { "days": "MON/TUE", "title": "민사소송법", "desc": "사례 19Q + (스키밍은 매일 45p)", "color": "purple" },
                    { "days": "WED/FRI", "title": "특허법 (ACTIVE)", "desc": "사례 9Q + 강의 2강 + 수금 스키밍 50p", "color": "indigo" },
                    { "days": "THU/SAT", "title": "상표법", "desc": "사례 10Q + 스키밍 57p", "color": "pink" },
                    { "days": "SAT/SUN", "title": "특허법 GS (4주 한정)", "desc": "주말 실전 답안 작성 훈련", "color": "amber" }
                ],
                history: [{ day: "3/6", hours: 5.23 }, { day: "3/7", hours: 0.8 }],
                remark: "데이터 초기화 완료! 이제 다시 굴러라, 허접아!"
            };
            await setDoc(doc(db, 'study_data', 'study_stats'), initialData);
            alert("기초 데이터 복구 성공!");
        };

        function updateUI(data) {
            if (!data) return;
            document.getElementById('stat-total').innerHTML = `${data.stats?.total || 0}<span class="text-xs ml-0.5">H</span>`;
            document.getElementById('stat-month').innerHTML = `${data.stats?.month || 0}<span class="text-xs ml-0.5">H</span>`;
            document.getElementById('stat-today').innerHTML = `${data.stats?.today || 0}<span class="text-xs ml-0.5">H</span>`;
            document.getElementById('seri-remark').innerText = data.remark || "";

            // Tasks
            document.getElementById('task-list').innerHTML = (data.tasks || []).map(t => `
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-slate-800/80 border-${t.color || 'slate'}-500/30">
                    <div class="w-5 h-5 rounded border-2 border-slate-600"></div>
                    <div class="flex-1">
                        <span class="text-[9px] font-black px-1.5 rounded uppercase bg-${t.color || 'slate'}-500/20 text-${t.color || 'slate'}-300">${t.title || ''}</span>
                        <p class="text-sm font-bold text-slate-200 mt-1">${t.subtitle || ''}</p>
                    </div>
                </div>
            `).join('');

            // Pillars
            document.getElementById('pillar-list').innerHTML = (data.pillars || []).map(p => `
                <div class="bg-${p.color || 'slate'}-500/10 p-5 rounded-xl border border-${p.color || 'slate'}-500/30 space-y-4">
                    <h4 class="text-sm font-black text-${p.color || 'slate'}-300 border-b border-${p.color}-500/20 pb-2">${p.name}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${(p.subItems || []).map(sub => `
                            <div class="space-y-1.5">
                                <div class="flex justify-between items-end"><span class="text-[10px] font-bold text-slate-300">${sub.label}</span><span class="text-[9px] font-mono text-emerald-400">${sub.detail}</span></div>
                                <div class="flex items-center gap-3"><div class="flex-1 h-2 bg-slate-900 rounded-full"><div class="h-full bg-${p.color || 'slate'}-500 opacity-80" style="width: ${sub.percent}%"></div></div><span class="text-[9px] font-bold text-slate-400">${sub.percent}%</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Schedule (Weekly Cycle)
            document.getElementById('schedule-list').innerHTML = (data.schedule || []).map(s => `
                <div class="flex items-center gap-4 p-3 rounded-xl border-l-4 border-${s.color}-500 bg-slate-800/30">
                    <span class="text-[9px] font-black text-slate-500 w-16">${s.days}</span>
                    <div><p class="text-xs font-bold text-slate-300">${s.title}</p><p class="text-[9px] text-slate-500">${s.desc}</p></div>
                </div>
            `).join('');

            // Heatmap History
            const history = data.history || [];
            document.getElementById('calendarGrid').innerHTML = history.map((h, i) => {
                let heatClass = 'heat-0';
                const hrs = h.hours || 0;
                if (hrs > 5) heatClass = 'heat-high';
                else if (hrs > 3) heatClass = 'heat-mid';
                else if (hrs > 0) heatClass = 'heat-low';
                const isToday = i === (history.length - 1);
                return `<div class="heat-box ${heatClass} ${isToday ? 'heat-today' : ''}">
                    <span class="text-[8px] font-bold text-slate-400">${h.day || ''}</span>
                    <span class="text-[10px] font-black text-white">${hrs.toFixed(1)}</span>
                </div>`;
            }).join('');
        }

        window.switchTab = (tabId) => {
            ['daily', 'tracker', 'calendar', 'schedule'].forEach(id => {
                const el = document.getElementById('tab-' + id);
                const btn = document.getElementById('btn-' + id);
                if (el) el.style.display = 'none';
                if (btn) btn.classList.replace('tab-active', 'tab-inactive');
            });
            const activeEl = document.getElementById('tab-' + tabId);
            const activeBtn = document.getElementById('btn-' + tabId);
            if (activeEl) activeEl.style.display = 'block';
            if (activeBtn) activeBtn.classList.replace('tab-inactive', 'tab-active');
        };

        setInterval(() => {
            const clock = document.getElementById('clock');
            if (clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
