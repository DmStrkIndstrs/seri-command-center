<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘T Science Vessel - Command Center</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas for Image Capture -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts: Rajdhani & Share Tech Mono & Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f4f8;
            --panel: rgba(255,255,255,0.97);
            --border: #cbd5e1;
            --accent: #0284c7;
            --text: #1e293b;
            --grid: rgba(14,116,144,0.05);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
        }

        h1,h2,h3,h4,.font-hud { font-family: 'Rajdhani', sans-serif; }
        .font-mono-tech { font-family: 'Share Tech Mono', monospace; }

        .terran-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            backdrop-filter: blur(8px);
            position: relative;
        }
        .terran-panel::before {
            content:''; position:absolute; top:-1px; left:-1px; width:12px; height:12px;
            border-top:3px solid var(--accent); border-left:3px solid var(--accent);
        }
        .terran-panel::after {
            content:''; position:absolute; bottom:-1px; right:-1px; width:12px; height:12px;
            border-bottom:3px solid var(--accent); border-right:3px solid var(--accent);
        }

        .terran-row-hover:hover { background-color:#f1f5f9; transition:all 0.2s; }

        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.35s ease-out both; }

        .custom-scrollbar::-webkit-scrollbar { height:8px; width:8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background:#e2e8f0; border-radius:4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:#94a3b8; border-radius:4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background:#64748b; }

        .tech-pattern {
            background-image:linear-gradient(-45deg,rgba(255,255,255,0.3) 25%,transparent 25%,transparent 50%,rgba(255,255,255,0.3) 50%,rgba(255,255,255,0.3) 75%,transparent 75%,transparent);
            background-size:10px 10px;
        }

        /* Loading Spinner */
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(2, 132, 199, 0.2);
            border-top-color: #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 📸 캡처 모드 전용 스타일 */
        .capture-mode { 
            background-color: #ffffff !important;
            width: max-content !important; 
            padding: 24px !important; 
            box-shadow: none !important;
        }
        .capture-scroll-visible {
            overflow: visible !important; 
            width: max-content !important;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ──────────────────────────────────────────────
// 대시보드 컴포넌트 (데이터를 Props로 받아 렌더링)
// ──────────────────────────────────────────────
function Dashboard({ appData }) {
    const [selectedClassId, setSelectedClassId] = useState(Object.keys(appData.classes)[0]);
    const [activeTab, setActiveTab] = useState('schedule');

    const currentData = appData.classes[selectedClassId];

    // 📸 이미지 캡처 기능 (backdrop-filter 전역 제거로 뿌연 현상 완전 해결)
    const handleDownloadImage = () => {
        const element = document.getElementById('capture-area');
        if (!element) return;

        const scrollDiv = element.querySelector('.overflow-x-auto');

        // 1. 전역 style 태그 주입: backdrop-filter를 페이지 전체에서 완전히 차단
        const styleOverride = document.createElement('style');
        styleOverride.id = 'capture-override';
        styleOverride.textContent = `
            * {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }
            .terran-panel {
                background: #ffffff !important;
            }
        `;
        document.head.appendChild(styleOverride);

        // 2. 캡처 영역 레이아웃 확장 (잘림 방지)
        element.classList.add('capture-mode');
        if (scrollDiv) scrollDiv.classList.add('capture-scroll-visible');

        // 3. 스타일 적용 대기 후 캡처
        setTimeout(() => {
            window.html2canvas(element, {
                backgroundColor: '#ffffff',
                scale: 3,
                useCORS: true,
                allowTaint: true,
                logging: false,
                imageTimeout: 0,
                windowWidth: element.scrollWidth + 50,
                width: element.scrollWidth
            })
            .then(canvas => {
                const link = document.createElement('a');
                const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g, '-').replace('.', '');
                link.download = `CREW_REPORT_${selectedClassId.toUpperCase()}_${today}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            })
            .catch(err => {
                console.error(err);
                alert("캡처에 실패했습니다.");
            })
            .finally(() => {
                // 4. 복구: 클래스 및 주입된 style 태그 제거
                element.classList.remove('capture-mode');
                if (scrollDiv) scrollDiv.classList.remove('capture-scroll-visible');
                document.getElementById('capture-override')?.remove();
            });
        }, 150);
    };

    const getBadgeColor = (type) => {
        switch(type) {
            case 'concept':  return 'bg-emerald-100 text-emerald-800 border-emerald-200';
            case 'practice': return 'bg-blue-100 text-blue-800 border-blue-200';
            case 'deep':     return 'bg-purple-100 text-purple-800 border-purple-200';
            case 'ebs':      return 'bg-amber-100 text-amber-800 border-amber-200';
            case 'test':     return 'bg-red-100 text-red-800 border-red-200 font-bold';
            case 'final':    return 'bg-slate-800 text-white border-slate-900';
            case 'completed': return 'bg-slate-200 text-slate-500 border-slate-300';
            default:         return 'bg-slate-100 text-slate-800 border-slate-200';
        }
    };

    const renderStatus = (status) => {
        if (status === 'O')  return <span className="text-emerald-600 font-black text-lg">O</span>;
        if (status === 'X')  return <span className="text-red-600 font-black text-lg">X</span>;
        if (status === '△') return <span className="text-amber-500 font-black text-lg">△</span>;
        if (status === 'H')  return <span className="text-blue-600 font-black text-lg">H</span>;
        return <span className="text-slate-300 font-bold">-</span>;
    };

    const isExempt = (name) => {
        return currentData.assignments.every(a => (a.status?.[name] === 'H' || a.status?.[name] === undefined));
    };

    const calcProgress = (statusObj) => {
        if (!statusObj) return { percentage: 0 };
        const vals = Object.values(statusObj).filter(s => s !== 'H');
        const total = vals.length;
        if (!total) return { percentage: 0 };
        const score = vals.filter(s => s === 'O').length + vals.filter(s => s === '△').length * 0.5;
        return { percentage: Math.round((score / total) * 100) };
    };

    const calcStudentProgress = (name, assignments) => {
        let total = 0, score = 0;
        assignments.forEach(a => {
            const active = Object.values(a.status || {}).some(v => v === 'O' || v === 'X' || v === '△');
            if (active) {
                const s = a.status?.[name];
                if (s !== 'H') {
                    total++;
                    if (s === 'O') score += 1;
                    if (s === '△') score += 0.5;
                }
            }
        });
        if (!total) return { percentage: 0, hasData: false };
        return { percentage: Math.round((score / total) * 100), hasData: true };
    };

    return (
        <div className="min-h-screen pb-20 relative z-10 fade-in">
            {/* Header */}
            <header className="bg-white border-b border-slate-200 pt-10 pb-6 px-6 text-center relative z-20 shadow-sm">
                <div className="max-w-4xl mx-auto relative">
                    <h2 className="font-mono-tech text-blue-600 font-bold tracking-[0.3em] text-xs mb-3">
                        [ SECURE NETWORK // JEIL ACADEMY COMMAND ]
                    </h2>
                    <h1 className="font-hud text-4xl md:text-5xl font-black mb-1 tracking-wider text-slate-800">
                        {appData.mainTitle}
                    </h1>
                    
                    <div className="flex flex-col items-center gap-3 mb-5 mt-2">
                        <p className="font-mono-tech text-emerald-600 font-bold tracking-widest text-sm flex items-center gap-2">
                            <span className="w-2 h-2 bg-emerald-500 rounded-full cursor-blink inline-block"></span>
                            &gt; System online. Data live synchronized._
                        </p>
                    </div>

                    {/* 유튜브 링크 */}
                    <div className="flex flex-wrap justify-center items-center gap-3 mb-6 no-print">
                        <a href="https://youtube.com/@need_back_up?si=SWO08JmRh3W3SZAh" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 px-4 py-2 bg-red-50 border border-red-200 text-red-600 font-mono-tech text-xs tracking-widest hover:bg-red-100 hover:text-red-700 transition-colors rounded font-bold">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M8.051 1.999h.089c.822.003 4.987.033 6.11.335a2.01 2.01 0 0 1 1.415 1.42c.101.38.172.883.22 1.402l.01.104.022.26.008.104c.065.914.073 1.77.074 1.957v.075c-.001.194-.01 1.052-.072 1.953l-.008.105-.022.26-.01.104c-.048.519-.119 1.023-.22 1.402a2.007 2.007 0 0 1-1.415 1.42c-1.16.312-5.569.334-6.18.335h-.142c-.309 0-1.587-.006-2.927-.052l-.17-.006-.087-.004-.171-.007-.171-.007c-1.11-.049-2.167-.128-2.654-.26a2.007 2.007 0 0 1-1.415-1.419c-.111-.417-.185-.986-.235-1.558L.09 9.82l-.008-.104A31.4 31.4 0 0 1 0 7.68v-.123c.002-.215.01-.958.064-1.778l.007-.103.003-.052.008-.104.022-.26.01-.104c.048-.519.119-1.023.22-1.402a2.007 2.007 0 0 1 1.415-1.42c.487-.13 1.544-.21 2.654-.26l.17-.007.172-.006.086-.003.171-.007A99.788 99.788 0 0 1 7.858 2h.193zM6.4 5.209v4.818l4.157-2.408L6.4 5.209z"/>
                            </svg>
                            [ VIDEO DATALINK ]
                        </a>
                    </div>

                    {/* Class Tabs */}
                    <div className="flex flex-wrap justify-center gap-3 mt-4 no-print">
                        {Object.entries(appData.classes).map(([id, cls]) => (
                            <button key={id} onClick={() => { setSelectedClassId(id); setActiveTab('schedule'); }}
                                className={`px-6 py-2.5 font-mono-tech font-bold text-sm tracking-wider uppercase transition-all border rounded ${
                                    selectedClassId === id
                                    ? 'bg-blue-600 border-blue-600 text-white shadow-md'
                                    : 'bg-white border-slate-300 text-slate-500 hover:text-blue-600 hover:border-blue-300'
                                }`}>
                                {cls.name}
                            </button>
                        ))}
                    </div>
                </div>
            </header>

            <main className="max-w-5xl mx-auto px-4 mt-8 relative z-20">

                {/* Title Block */}
                <div className="terran-panel p-6 md:p-8 mb-6 text-center">
                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-2 font-hud tracking-wide">{currentData.title}</h2>
                    <p className="text-slate-500 font-mono-tech text-sm">{currentData.subtitle}</p>
                </div>

                {/* Notices */}
                <div className="terran-panel p-6 md:p-8 mb-6">
                    <h3 className="text-lg font-mono-tech font-bold mb-4 flex items-center text-blue-700 uppercase tracking-widest border-b border-slate-200 pb-2">
                        <span className="text-blue-500 mr-2 text-xl">■</span>
                        System Log & Directives
                    </h3>
                    <div className="space-y-3 font-mono-tech text-sm">
                        {(currentData.notices || []).map((notice, i) => (
                            <p key={i} className="text-slate-700 leading-relaxed flex items-start">
                                <span className="mr-3 text-blue-500 select-none">&gt;</span>
                                <span dangerouslySetInnerHTML={{__html: notice}}></span>
                            </p>
                        ))}
                    </div>
                </div>

                {/* Exam Scope */}
                <div className="terran-panel p-6 md:p-8 mb-8">
                    <h3 className="text-lg font-mono-tech font-bold mb-5 flex items-center text-blue-700 uppercase tracking-widest border-b border-slate-200 pb-2">
                        <span className="text-blue-500 mr-2 text-xl">■</span>
                        Target Coordinates (Exam Scope)
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        {[['physics','[A] PHYSICS'],['chemistry','[B] CHEMISTRY'],['biology','[C] BIOLOGY'],['earth','[D] EARTH SCI']].map(([key, label]) => (
                            <div key={key} className="bg-slate-50 border border-slate-200 p-4 hover:border-blue-400 transition-colors group rounded-sm">
                                <h4 className="font-mono-tech font-bold text-slate-700 mb-3 border-b border-slate-200 pb-2 flex justify-between items-center group-hover:text-blue-600">
                                    <span>{label}</span>
                                    <span className="text-[10px] bg-white text-slate-500 px-2 py-0.5 rounded border border-slate-200">
                                        {(currentData.examScope?.[key] || []).length} LOC
                                    </span>
                                </h4>
                                <ul className="text-xs font-mono-tech text-slate-600 space-y-2">
                                    {(currentData.examScope?.[key] || []).map((item, i) => (
                                        <li key={i} className="leading-relaxed break-keep pr-1">+ {item}</li>
                                    ))}
                                </ul>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Sub Tabs */}
                <div className="flex justify-center mb-4 space-x-2 no-print">
                    {[['schedule','[1] TIME_TABLE'],['assignments','[2] CREW_TRACKER']].map(([tab, label]) => (
                        <button key={tab} onClick={() => setActiveTab(tab)}
                            className={`px-6 py-2.5 font-mono-tech font-bold text-sm tracking-wider uppercase border transition-all duration-200 rounded-t-md ${
                                activeTab === tab
                                ? 'bg-white border-slate-300 border-b-white text-blue-600 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]'
                                : 'bg-slate-100 border-slate-200 text-slate-500 hover:bg-white hover:text-blue-500'
                            }`}
                            style={activeTab === tab ? { marginBottom:'-1px', zIndex:10, position:'relative' } : {}}>
                            {label}
                        </button>
                    ))}
                </div>

                {/* Schedule Tab */}
                {activeTab === 'schedule' && (
                    <div className="terran-panel overflow-hidden fade-in">
                        <div className="p-4 bg-slate-50 border-b border-slate-200">
                            <h3 className="font-mono-tech font-bold text-slate-700 text-sm tracking-widest uppercase">
                                <span className="text-blue-500 mr-2">●</span> OPERATION SCHEDULE
                            </h3>
                        </div>
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[800px]">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-600 text-xs font-mono-tech tracking-widest border-b border-slate-200">
                                        <th className="py-3 px-6 text-center w-16">SEQ</th>
                                        <th className="py-3 px-4 w-24">DATE</th>
                                        <th className="py-3 px-6">MISSION_OBJECTIVE</th>
                                        <th className="py-3 px-6 w-1/4 text-center">REQUIRED_ACTION</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm font-sans">
                                    {(currentData.schedule || []).map((row) => (
                                        <tr key={row.id} className={`terran-row-hover group ${row.type === 'completed' ? 'opacity-60 bg-slate-50' : ''}`}>
                                            <td className="py-4 px-6 text-center">
                                                <span className={`inline-block px-2 py-0.5 rounded font-mono-tech font-bold border ${getBadgeColor(row.type)}`}>
                                                    #{String(row.id).padStart(2,'0')}
                                                </span>
                                            </td>
                                            <td className="py-4 px-4 font-mono-tech text-slate-500 font-bold">
                                                {row.date} <span className="text-[10px] text-slate-400 font-normal">({row.day})</span>
                                            </td>
                                            <td className={`py-4 px-6 whitespace-pre-line leading-relaxed ${row.type==='test'?'text-red-600 font-bold':row.type==='final'?'text-slate-900 font-bold':row.type==='completed'?'text-slate-500':'text-slate-700'}`}>
                                                {row.content}
                                            </td>
                                            <td className="py-4 px-6 text-center">
                                                <span className={`bg-white font-mono-tech text-xs font-bold px-3 py-1.5 rounded border border-slate-200 block w-full transition-colors ${row.type === 'completed' ? 'text-slate-400' : 'text-slate-600 group-hover:border-blue-300 group-hover:text-blue-700'}`}>
                                                    {row.homework}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                )}

                {/* Assignments Tab */}
                {activeTab === 'assignments' && (
                    <div id="capture-area" className="terran-panel overflow-hidden fade-in flex flex-col pt-1">
                        <div className="p-4 border-b border-slate-200 flex justify-between items-center flex-wrap gap-4 bg-white">
                            <h3 className="font-mono-tech font-bold text-slate-700 text-sm tracking-widest uppercase">
                                <span className="text-blue-500 mr-2">●</span>
                                CREW TASK STATUS (TOTAL: {currentData.students.length})
                            </h3>
                            <div className="flex items-center gap-3">
                                <div className="flex space-x-3 text-[10px] font-mono-tech font-bold bg-slate-50 px-3 py-1.5 rounded border border-slate-200">
                                    <span className="text-emerald-600">O:완료</span>
                                    <span className="text-amber-500">△:미흡</span>
                                    <span className="text-blue-600">H:HOLD</span>
                                    <span className="text-slate-400">-:미제출</span>
                                </div>
                                <button onClick={handleDownloadImage}
                                    className="no-print flex items-center gap-2 px-3 py-1.5 bg-blue-50 border border-blue-200 text-blue-600 font-mono-tech text-xs tracking-widest hover:bg-blue-600 hover:text-white transition-colors font-bold rounded">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                                        <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1zm9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/>
                                    </svg>
                                    [ CAPTURE ]
                                </button>
                            </div>
                        </div>

                        <div className="overflow-x-auto custom-scrollbar flex-1 bg-white">
                            <table className="w-full text-left border-collapse min-w-[1000px]">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-600 text-xs font-mono-tech tracking-widest border-b border-slate-200">
                                        <th className="py-3 px-6 text-center w-12">ID</th>
                                        <th className="py-3 px-4 min-w-[200px]">TASK / DUE</th>
                                        <th className="py-3 px-4 text-center border-l border-slate-200">CMPLTN_%</th>
                                        {currentData.students.map((s, i) => (
                                            <th key={i} className={`py-3 px-2 text-center min-w-[60px] ${isExempt(s) ? 'text-blue-600' : 'text-slate-600'}`}>
                                                {s}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {(currentData.assignments || []).length === 0 && (
                                        <tr><td colSpan={3+currentData.students.length} className="text-center py-10 font-mono-tech text-slate-400">NO DATA</td></tr>
                                    )}
                                    {(currentData.assignments || []).map((a, idx) => {
                                        const { percentage } = calcProgress(a.status);
                                        return (
                                            <tr key={a.id} className="terran-row-hover text-sm font-sans">
                                                <td className="py-3 px-6 text-center text-slate-400 font-mono-tech font-bold">
                                                    {String(idx+1).padStart(2,'0')}
                                                </td>
                                                <td className="py-3 px-4">
                                                    <div className="font-bold text-slate-700">{a.title}</div>
                                                    <div className="text-[10px] font-mono-tech text-slate-500 mt-1 font-bold">
                                                        <span className="text-blue-500 mr-1">&gt;</span>{a.dueDate}
                                                    </div>
                                                </td>
                                                <td className="py-3 px-4 border-l border-slate-100 text-center">
                                                    <div className="flex flex-col items-center">
                                                        <span className={`text-xs font-mono-tech font-bold ${percentage>=80?'text-emerald-600':percentage>0?'text-blue-600':'text-slate-400'}`}>
                                                            {percentage}%
                                                        </span>
                                                        <div className="w-12 h-1.5 bg-slate-200 rounded-full mt-1 overflow-hidden">
                                                            <div className={`h-full ${percentage>=80?'bg-emerald-500':'bg-blue-500'}`} style={{width:`${percentage}%`}}></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                {currentData.students.map((s, i) => (
                                                    <td key={i} className={`py-3 px-2 text-center border-l border-slate-50 ${isExempt(s)?'bg-blue-50/40':''}`}>
                                                        {renderStatus(a.status?.[s] || '-')}
                                                    </td>
                                                ))}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        {/* Performance Metrics */}
                        <div className="p-6 bg-slate-50 border-t border-slate-200">
                            <h4 className="font-mono-tech font-bold text-slate-700 text-sm tracking-widest uppercase mb-5 flex items-center">
                                <span className="text-blue-500 mr-2 text-lg">📊</span> CREW PERFORMANCE METRICS
                            </h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4">
                                {currentData.students.map(s => {
                                    const { percentage, hasData } = calcStudentProgress(s, currentData.assignments || []);
                                    return (
                                        <div key={s} className="flex items-center gap-3 font-mono-tech">
                                            <div className={`w-16 text-sm truncate font-bold ${isExempt(s)?'text-blue-600':'text-slate-600'}`}>{s}</div>
                                            <div className="flex-1 h-3 bg-slate-200 border border-slate-300 relative overflow-hidden rounded-sm">
                                                {hasData ? (
                                                    <div
                                                        className={`h-full transition-all duration-1000 ease-out ${percentage>=80?'bg-emerald-500':percentage>=50?'bg-amber-400':'bg-red-500'}`}
                                                        style={{width:`${percentage}%`}}>
                                                        <div className="absolute inset-0 tech-pattern opacity-50"></div>
                                                    </div>
                                                ) : (
                                                    <div className="h-full bg-slate-100 flex items-center justify-center text-[9px] text-slate-400 tracking-widest font-bold">
                                                        {isExempt(s) ? 'HOLD' : 'NO DATA'}
                                                    </div>
                                                )}
                                            </div>
                                            <div className={`w-10 text-right text-sm font-bold ${hasData?(percentage>=80?'text-emerald-600':percentage>=50?'text-amber-600':'text-red-600'):'text-slate-400'}`}>
                                                {hasData ? `${percentage}%` : 'N/A'}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                )}
            </main>

            <footer className="mt-12 text-center text-slate-400 text-xs font-mono-tech pb-8 relative z-20 font-bold">
                <p className="flex justify-center items-center gap-2">
                    <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse inline-block"></span>
                    SYSTEMS ONLINE. ALL COMMS OPEN.
                </p>
            </footer>
        </div>
    );
}

// ──────────────────────────────────────────────
// Root App (JSON Fetch Logic)
// ──────────────────────────────────────────────
function App() {
    const [appData, setAppData] = useState(null);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);

    useEffect(() => {
        fetch('data.json?t=' + new Date().getTime())
            .then(response => {
                if (!response.ok) {
                    throw new Error('데이터 파일을 불러오는 데 실패했습니다.');
                }
                return response.json();
            })
            .then(data => {
                setAppData(data);
                setLoading(false);
            })
            .catch(err => {
                console.error(err);
                setError('데이터를 불러오지 못했습니다. (data.json 파일 확인)');
                setLoading(false);
            });
    }, []);

    if (loading) {
        return (
            <div className="min-h-screen bg-[#f0f4f8] flex flex-col items-center justify-center text-slate-600 font-mono-tech fade-in">
                <div className="spinner mb-4"></div>
                <p className="tracking-widest animate-pulse font-bold text-sm">FETCHING DATA...</p>
            </div>
        );
    }

    if (error) {
        return (
            <div className="min-h-screen bg-[#f0f4f8] flex flex-col items-center justify-center text-red-600 font-mono-tech">
                <p className="text-4xl mb-4">⚠️</p>
                <p className="font-bold tracking-widest">{error}</p>
            </div>
        );
    }

    return <Dashboard appData={appData} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
