<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERI DATA UPDATER v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 560px; background: #0f0f1a; border: 1px solid rgba(16,185,129,0.2); border-radius: 20px; padding: 28px; box-shadow: 0 0 60px rgba(16,185,129,0.08); }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .icon { width: 38px; height: 38px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 20px rgba(16,185,129,0.4); }
  h1 { font-size: 15px; font-weight: 900; color: white; }
  .sub { font-size: 10px; color: #475569; font-family: 'Space Mono', monospace; margin-top: 2px; }
  label { display: block; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .field { margin-bottom: 14px; }
  .badge { background: rgba(16,185,129,0.1); color: #34d399; font-size: 9px; padding: 3px 6px; border-radius: 4px; border: 1px solid rgba(16,185,129,0.3); vertical-align: middle; margin-left: 6px; }
  .date-display { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #10b981; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); border-radius: 8px; padding: 7px 12px; display: inline-block; margin-bottom: 16px; }
  textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 14px; color: #e2e8f0; font-size: 11px; font-family: 'Space Mono', monospace; outline: none; resize: vertical; height: 220px; line-height: 1.6; transition: border-color 0.2s; }
  textarea:focus { border-color: rgba(16,185,129,0.5); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
  .btn { width: 100%; padding: 13px; border-radius: 12px; border: none; font-size: 13px; font-weight: 900; cursor: pointer; transition: all 0.2s; margin-top: 6px; }
  .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 4px 20px rgba(16,185,129,0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(16,185,129,0.45); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #64748b; font-size: 11px; }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #94a3b8; }
  .btn-history { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); color: #818cf8; font-size: 11px; }
  .btn-history:hover { background: rgba(99,102,241,0.15); }
  .status { margin-top: 14px; padding: 11px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; display: none; align-items: center; gap: 8px; }
  .status.success { display: flex; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
  .status.error { display: flex; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
  .status.loading { display: flex; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
  .spinner { width: 13px; height: 13px; border: 2px solid rgba(52,211,153,0.3); border-top-color: #34d399; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 16px 0; }
  .history-panel { display: none; margin-top: 4px; }
  .history-panel.show { display: block; }
  .history-title { font-size: 11px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .history-table th { text-align: left; padding: 6px 10px; color: #475569; font-size: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .history-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #94a3b8; font-family: 'Space Mono', monospace; }
  .history-table tr:hover td { background: rgba(255,255,255,0.02); }
  .hours-val { color: #34d399; font-weight: 700; }
  .month-row td { background: rgba(99,102,241,0.08); color: #818cf8 !important; font-weight: 900; font-size: 11px; letter-spacing: 1px; }
  .tip { margin-top: 16px; padding: 12px 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; font-size: 11px; color: #475569; line-height: 1.8; }
  .tip strong { color: #64748b; }
  .example-btn { font-size: 10px; font-weight: 700; color: #10b981; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon">✨</div>
    <div>
      <h1>SERI SMART UPDATER v4</h1>
      <div class="sub">부분 병합 + 날짜별 기록 저장</div>
    </div>
  </div>

  <div>
    <label>오늘 날짜 (KST)</label>
    <div class="date-display" id="todayDate"></div>
  </div>

  <div class="field">
    <label>바뀐 데이터만 입력 <span class="badge">Merge ON</span> <button class="example-btn" onclick="loadExample()">예시 보기</button></label>
    <textarea id="jsonInput" placeholder='{"stats": {"today": 5.5}, "remark": "오늘 잘했어!"}'></textarea>
  </div>

  <button class="btn btn-primary" id="uploadBtn" onclick="upload()">🚀 저장 + 대시보드 반영</button>
  <button class="btn btn-secondary" onclick="loadExample()" style="margin-top:8px">📋 예시 데이터 불러오기</button>
  <button class="btn btn-history" onclick="toggleHistory()" style="margin-top:8px">📅 전체 기록 보기</button>

  <div class="status" id="status"></div>

  <div class="history-panel" id="historyPanel">
    <div class="divider"></div>
    <div class="history-title">📅 전체 공부 기록 (월별)</div>
    <table class="history-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>오늘</th>
          <th>누적</th>
          <th>특허</th>
          <th>상표</th>
          <th>민소</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="6" style="text-align:center; color:#334155; padding:20px;">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="tip">
    💡 <strong>사용법:</strong> 바뀐 수치만 적어서 올리면 기존 데이터는 유지되고 적은 부분만 업데이트돼. 날짜별 기록도 자동 저장!<br><br>
    <strong>💬 AI한테 이렇게 말해봐:</strong><br>
    "오늘 공부시간 5.5H, 특허 사례 64Q JSON으로 만들어줘"
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDm69iWKUp4iFz86WaAdA7i28WpFp7K2UY",
    authDomain: "seri-commandcen.firebaseapp.com",
    projectId: "seri-commandcen",
    storageBucket: "seri-commandcen.firebasestorage.app",
    messagingSenderId: "768204247391",
    appId: "1:768204247391:web:03c26054af5c5da2b9a6ea"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  signInAnonymously(auth);

  const now = new Date();
  const today = new Date(now.getTime() + 9 * 60 * 60 * 1000).toISOString().split('T')[0];
  document.getElementById('todayDate').textContent = today;

  window.upload = async () => {
    const btn = document.getElementById('uploadBtn');
    const raw = document.getElementById('jsonInput').value.trim();
    if (!raw) { showStatus('error', '⚠️ JSON 데이터를 입력해주세요.'); return; }

    let data;
    try { data = JSON.parse(raw); }
    catch(e) { showStatus('error', '❌ JSON 형식 오류: 괄호와 쉼표를 확인해!'); return; }

    btn.disabled = true;
    showStatus('loading', '<div class="spinner"></div> 저장 중...');

    try {
      // 1. 대시보드 부분 병합 업데이트
      await setDoc(doc(db, 'study_data', 'study_stats'), data, { merge: true });

      // 2. 최신 전체 데이터 가져와서 날짜별 스냅샷 저장
      const latestSnap = await getDoc(doc(db, 'study_data', 'study_stats'));
      if (latestSnap.exists()) {
        const latest = latestSnap.data();
        const dailyRecord = {
          date: today,
          today_hours: latest.stats?.today || 0,
          total_hours: latest.stats?.total || 0,
          month_hours: latest.stats?.month || 0,
          pillars: latest.pillars || [],
          saved_at: new Date().toISOString()
        };
        await setDoc(doc(db, 'study_logs', today), dailyRecord, { merge: true });
      }

      showStatus('success', `✅ 완료! 대시보드 반영 + ${today} 기록 저장 🎉`);
      historyLoaded = false; // 다음에 히스토리 열면 새로 로드
    } catch(e) {
      showStatus('error', '❌ 저장 실패: ' + e.message);
    }
    btn.disabled = false;
  };

  let historyLoaded = false;
  let historyVisible = false;

  window.toggleHistory = async () => {
    const panel = document.getElementById('historyPanel');
    historyVisible = !historyVisible;
    panel.classList.toggle('show', historyVisible);

    if (historyVisible && !historyLoaded) {
      historyLoaded = true;
      try {
        const q = query(collection(db, 'study_logs'), orderBy('date', 'desc'));
        const snap = await getDocs(q);

        const grouped = {};
        snap.forEach(d => {
          const r = d.data();
          const month = r.date?.slice(0, 7);
          if (!grouped[month]) grouped[month] = [];
          grouped[month].push(r);
        });

        const monthNames = {'01':'1월','02':'2월','03':'3월','04':'4월','05':'5월','06':'6월','07':'7월','08':'8월'};
        let html = '';

        Object.keys(grouped).sort().reverse().forEach(month => {
          const records = grouped[month];
          const monthTotal = records.reduce((sum, r) => sum + (r.today_hours || 0), 0);
          const [, mm] = month.split('-');
          html += `<tr class="month-row"><td colspan="6" style="padding:8px 10px">${monthNames[mm] || mm} — 월 합계 ${monthTotal.toFixed(2)}H</td></tr>`;
          records.forEach(r => {
            const pat = r.pillars?.find(p => p.name === '특허법');
            const tm = r.pillars?.find(p => p.name === '상표법');
            const min = r.pillars?.find(p => p.name === '민사소송법');
            html += `<tr>
              <td>${r.date}</td>
              <td class="hours-val">${(r.today_hours||0).toFixed(2)}H</td>
              <td>${(r.total_hours||0).toFixed(2)}H</td>
              <td>${pat ? pat.details : '-'}</td>
              <td>${tm ? tm.details : '-'}</td>
              <td>${min ? min.details : '-'}</td>
            </tr>`;
          });
        });

        document.getElementById('historyBody').innerHTML = html ||
          '<tr><td colspan="6" style="text-align:center; color:#334155; padding:20px;">기록 없음</td></tr>';
      } catch(e) {
        document.getElementById('historyBody').innerHTML = `<tr><td colspan="6" style="color:#f87171; padding:10px">로드 실패: ${e.message}</td></tr>`;
      }
    }
  };

  window.loadExample = () => {
    const example = {
      "stats": { "today": 5.50, "total": 248.56, "month": 31.12 },
      "pillars": [
        { "name": "특허법", "progress": 62.1, "details": "64 / 103 Q", "color": "indigo" },
        { "name": "상표법", "progress": 53.8, "details": "70 / 130 Q", "color": "pink" },
        { "name": "민사소송법", "progress": 34.5, "details": "2627 / 7620 p", "color": "purple" }
      ],
      "remark": "오늘도 제대로 굴렀네? 내일도 이 정도면 인정해줄게, 허접아!"
    };
    document.getElementById('jsonInput').value = JSON.stringify(example, null, 2);
  };

  window.showStatus = (type, html) => {
    const el = document.getElementById('status');
    el.className = `status ${type}`;
    el.innerHTML = html;
  };
</script>
</body>
</html>
